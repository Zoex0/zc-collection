<script>
// ===== IMAGE COMPRESSION (Canvas API) =====
var ImageCompressor = {
  MAX_DIMENSION: 1600,
  JPEG_QUALITY: 0.75,
  compress: function(file) {
    var self = this;
    return new Promise(function(resolve, reject) {
      var img = new Image();
      img.onload = function() {
        try {
          var canvas = document.createElement('canvas');
          var w = img.width, h = img.height;
          if (w > self.MAX_DIMENSION || h > self.MAX_DIMENSION) {
            var ratio = Math.min(self.MAX_DIMENSION / w, self.MAX_DIMENSION / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob(function(blob) {
            if (blob) {
              console.log('Compressed: ' + (file.size/1024).toFixed(0) + 'KB -> ' + (blob.size/1024).toFixed(0) + 'KB');
              resolve(blob);
            } else { reject(new Error('Compression failed')); }
          }, 'image/jpeg', self.JPEG_QUALITY);
        } catch (err) { reject(err); }
      };
      img.onerror = function() { reject(new Error('Failed to load image')); };
      img.src = URL.createObjectURL(file);
    });
  }
};

// Generate blurry thumbnail for encrypted photo lock state
function generateThumbnail(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var size = 200;
      var ratio = Math.min(size / img.width, size / img.height);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      var ctx = canvas.getContext('2d');
      ctx.filter = 'blur(8px)';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(function(blob) { resolve(blob); }, 'image/jpeg', 0.5);
    };
    img.src = URL.createObjectURL(file);
  });
}

// ===== PHOTO ENCRYPTION (AES-GCM + PBKDF2) =====
var PhotoCrypto = {
  deriveKey: function(password, salt) {
    var enc = new TextEncoder();
    return crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey'])
      .then(function(keyMaterial) {
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
          keyMaterial,
          { name: 'AES-GCM', length: 256 },
          false,
          ['encrypt', 'decrypt']
        );
      });
  },
  encrypt: function(blob, password) {
    var salt = crypto.getRandomValues(new Uint8Array(16));
    var iv = crypto.getRandomValues(new Uint8Array(12));
    return this.deriveKey(password, salt).then(function(key) {
      return blob.arrayBuffer().then(function(data) {
        return crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, data).then(function(encrypted) {
          return {
            data: new Blob([encrypted], { type: 'application/octet-stream' }),
            salt: btoa(String.fromCharCode.apply(null, salt)),
            iv: btoa(String.fromCharCode.apply(null, iv))
          };
        });
      });
    });
  },
  decrypt: function(encryptedBlob, password, saltB64, ivB64) {
    var salt = new Uint8Array(atob(saltB64).split('').map(function(c) { return c.charCodeAt(0); }));
    var iv = new Uint8Array(atob(ivB64).split('').map(function(c) { return c.charCodeAt(0); }));
    return this.deriveKey(password, salt).then(function(key) {
      return encryptedBlob.arrayBuffer().then(function(data) {
        return crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, data).then(function(decrypted) {
          return new Blob([decrypted], { type: 'image/jpeg' });
        });
      });
    });
  }
};

// ===== GITHUB API (replaces Firebase Storage) =====
var GitHubAPI = {
  owner: 'Zoex0',
  repo: 'zc-collection',
  branch: 'main',

  getToken: function() {
    return sessionStorage.getItem('github_token') || '';
  },

  setToken: function(token) {
    sessionStorage.setItem('github_token', token);
  },

  blobToBase64: function(blob) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onloadend = function() {
        resolve(reader.result.split(',')[1]);
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  },

  generateFilename: function(blob) {
    var ts = Date.now();
    var ext = blob.type === 'image/jpeg' ? '.jpg' : '.bin';
    return ts + ext;
  },

  upload: function(blob, filename) {
    var self = this;
    var path = 'photos/' + filename;
    return this.blobToBase64(blob).then(function(base64) {
      var controller = new AbortController();
      var timeout = setTimeout(function() { controller.abort(); }, 60000);
      return fetch('https://api.github.com/repos/' + self.owner + '/' + self.repo + '/contents/' + path, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + self.getToken(),
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'upload: ' + filename,
          content: base64,
          branch: self.branch
        }),
        signal: controller.signal
      }).then(function(resp) {
        clearTimeout(timeout);
        if (!resp.ok) throw new Error('GitHub upload failed: ' + resp.status);
        return resp.json();
      }).then(function() { return path; }).catch(function(err) {
        clearTimeout(timeout);
        if (err.name === 'AbortError') throw new Error('上传超时（60秒），请检查网络后重试');
        throw err;
      });
    });
  },

  deleteFile: function(path) {
    var self = this;
    var token = this.getToken();
    if (!token || !path) return Promise.resolve();
    var url = 'https://api.github.com/repos/' + self.owner + '/' + self.repo + '/contents/' + path;
    return fetch(url + '?ref=' + self.branch, {
      headers: { 'Authorization': 'token ' + token }
    }).then(function(resp) {
      if (!resp.ok) return null;
      return resp.json();
    }).then(function(data) {
      if (!data || !data.sha) return null;
      return fetch(url, {
        method: 'DELETE',
        headers: {
          'Authorization': 'token ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'delete: ' + path,
          sha: data.sha,
          branch: self.branch
        })
      });
    }).catch(function() {});
  }
};

// ===== DATA ACCESS (Firestore) =====
var DataAccess = {
  photos: [],
  tags: [],
  unsubscribePhotos: null,
  unsubscribeTags: null,

  init: function() {
    var db = window.firebaseDB;
    var self = this;
    if (!db) { console.warn('Firebase not ready, using static data'); return Promise.resolve(); }

    return new Promise(function(resolve) {
      // Listen to tags
      self.unsubscribeTags = db.collection('tags').orderBy('createdAt')
        .onSnapshot(
          function(snapshot) {
            self.tags = snapshot.docs.map(function(doc) { return Object.assign({ tagId: doc.id }, doc.data()); });
            window.dispatchEvent(new CustomEvent('tags-updated', { detail: self.tags }));
            resolve();
          },
          function(err) { console.warn('Tags listener error:', err); resolve(); }
        );

      // Listen to photos
      self.unsubscribePhotos = db.collection('photos').orderBy('date', 'desc')
        .onSnapshot(
          function(snapshot) {
            self.photos = snapshot.docs.map(function(doc) {
              var data = doc.data();
              var dateParts = (data.date || '').split('-');
              var group = dateParts.length >= 2 ? dateParts[0] + '-' + dateParts[1] : 'unknown';
              return Object.assign({ docId: doc.id }, data, {
                version: data.version || 0,
                src: data.storagePath || '',
                thumb: data.thumbnailPath || data.storagePath || '',
                title: data.name || '',
                group: group
              });
            });
            window.dispatchEvent(new CustomEvent('photos-updated', { detail: self.photos }));
          },
          function(err) { console.warn('Photos listener error:', err); }
        );
    });
  },

  addPhoto: function(photoData, imageBlob, thumbnailBlob, encryptedData) {
    var db = window.firebaseDB;
    var photoRef = db.collection('photos').doc();
    var photoId = photoRef.id;
    var mainFilename = photoData.encrypted ? (photoId + '.bin') : (photoId + '.jpg');
    var thumbFilename = photoId + '_blur.jpg';

    // Upload main image to GitHub
    return GitHubAPI.upload(imageBlob, mainFilename).then(function(mainPath) {
      // Upload thumbnail if exists (encrypted photos)
      if (thumbnailBlob) {
        return GitHubAPI.upload(thumbnailBlob, thumbFilename).then(function(thumbPath) {
          return { mainPath: mainPath, thumbPath: thumbPath };
        });
      }
      return { mainPath: mainPath, thumbPath: null };
    }).then(function(paths) {
      return photoRef.set({
        name: photoData.name,
        date: photoData.date,
        description: photoData.description || '',
        tags: photoData.tags || [],
        encrypted: photoData.encrypted,
        storagePath: paths.mainPath,
        thumbnailPath: paths.thumbPath,
        salt: (encryptedData && encryptedData.salt) || null,
        iv: (encryptedData && encryptedData.iv) || null,
        version: 1,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }).then(function() { return photoId; });
  },

  updatePhoto: function(docId, updates) {
    var db = window.firebaseDB;
    var photoRef = db.collection('photos').doc(docId);
    return db.runTransaction(function(transaction) {
      return transaction.get(photoRef).then(function(snap) {
        if (!snap.exists) throw new Error('Photo not found');
        var current = snap.data();
        if (updates._expectedVersion !== undefined && current.version !== updates._expectedVersion) {
          throw new Error('VERSION_CONFLICT');
        }
        delete updates._expectedVersion;
        updates.version = (current.version || 0) + 1;
        updates.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
        transaction.update(photoRef, updates);
      });
    });
  },

  deletePhoto: function(docId) {
    var db = window.firebaseDB;
    var docRef = db.collection('photos').doc(docId);
    // First get photo doc to find file paths
    return docRef.get().then(function(snap) {
      if (!snap.exists) throw new Error('Photo not found');
      var data = snap.data();
      var paths = [data.storagePath, data.thumbnailPath].filter(Boolean);
      // Delete GitHub files + Firestore doc in parallel
      var deletePromises = paths.map(function(p) { return GitHubAPI.deleteFile(p); });
      deletePromises.push(docRef.delete());
      return Promise.all(deletePromises);
    });
  },

  addTag: function(tagName) {
    return window.firebaseDB.collection('tags').add({
      tagName: tagName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  },

  updateTag: function(tagId, tagName) {
    return window.firebaseDB.collection('tags').doc(tagId).update({ tagName: tagName });
  },

  deleteTag: function(tagId) {
    var self = this;
    return window.firebaseDB.collection('tags').doc(tagId).delete().then(function() {
      var affected = self.photos.filter(function(p) { return (p.tags || []).indexOf(tagId) !== -1; });
      var updates = affected.map(function(photo) {
        return self.updatePhoto(photo.docId, {
          tags: photo.tags.filter(function(t) { return t !== tagId; }),
          _expectedVersion: photo.version
        });
      });
      return Promise.all(updates);
    });
  },

  getPhotoCount: function(tagId) {
    if (!tagId) return this.photos.length;
    return this.photos.filter(function(p) { return (p.tags || []).indexOf(tagId) !== -1; }).length;
  }
};
</script>

<script>
// ===== IDENTITY & AUTH =====
const AuthManager = {
  failedAttempts: 0, lockTimer: null, currentRole: null,
  init() {
    // 如果当前会话已有角色，直接恢复，不再弹窗
    var savedRole = sessionStorage.getItem('role');
    if (savedRole === 'admin' || savedRole === 'visitor') {
      this.currentRole = savedRole;
      if (savedRole === 'admin') document.body.classList.add('is-admin');
      window.dispatchEvent(new CustomEvent('role-changed', { detail: { role: savedRole } }));
      return;
    }
    this.showModal();
  },
  showModal() { document.getElementById('identity-overlay').classList.add('active'); },
  hideModal() { document.getElementById('identity-overlay').classList.remove('active'); },
  setRole(role, track) {
    if (track === undefined) track = true;
    this.currentRole = role;
    sessionStorage.setItem('role', role);
    this.hideModal();
    window.dispatchEvent(new CustomEvent('role-changed', { detail: { role: role } }));
    if (track && typeof plausible === 'function') plausible('identity_select', { props: { role: role } });
    if (role === 'admin') document.body.classList.add('is-admin');
    else document.body.classList.remove('is-admin');
  },
  async verifyAdmin(password) {
    try {
      if (!window.firebaseReady) { alert('Firebase 未就绪'); return; }
      var adminEmail = sessionStorage.getItem('adminEmail') || 'xieqing0111@gmail.com';
      await firebase.auth().signInWithEmailAndPassword(adminEmail, password);
      this.failedAttempts = 0;
      this.setRole('admin');
    } catch (err) {
      this.failedAttempts++;
      if (typeof plausible === 'function') plausible('auth_failure', { props: { attempt_count: this.failedAttempts } });
      var errEl = document.getElementById('identity-error');
      // Show specific error message for debugging
      if (err.code === 'auth/user-not-found') { errEl.textContent = '账号不存在，请先在 Firebase Console 创建'; }
      else if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') { errEl.textContent = '密码错误'; }
      else if (err.code === 'auth/too-many-requests') { errEl.textContent = '尝试次数过多，请稍后再试'; }
      else { errEl.textContent = '登录失败: ' + (err.code || err.message); }
      errEl.classList.add('visible');
      document.getElementById('admin-password').classList.add('error');
      if (this.failedAttempts >= 3) { this.lockUI(); }
    }
  },
  lockUI() {
    var btn = document.getElementById('btn-verify');
    var msg = document.getElementById('identity-lock-msg');
    var cd = document.getElementById('lock-countdown');
    btn.disabled = true; msg.classList.add('visible');
    var s = 30; cd.textContent = s;
    this.lockTimer = setInterval(function() { s--; cd.textContent = s; if (s <= 0) { clearInterval(AuthManager.lockTimer); btn.disabled = false; msg.classList.remove('visible'); AuthManager.failedAttempts = 0; } }, 1000);
  },
  logout() {
    if (window.firebaseReady) firebase.auth().signOut();
    sessionStorage.removeItem('role'); sessionStorage.removeItem('unlockedPhotos');
    this.currentRole = null; this.showModal();
    window.dispatchEvent(new CustomEvent('role-changed', { detail: { role: null } }));
    document.body.classList.remove('is-admin');
  },
  isAdmin() { return this.currentRole === 'admin'; },
  isVisitor() { return this.currentRole === 'visitor'; }
};

document.getElementById('btn-visitor').addEventListener('click', function() { AuthManager.setRole('visitor'); });
document.getElementById('btn-admin').addEventListener('click', function() {
  document.getElementById('identity-buttons').style.display = 'none';
  document.getElementById('identity-form').classList.add('active');
  document.getElementById('admin-password').focus();
});
document.getElementById('btn-verify').addEventListener('click', function() {
  var pw = document.getElementById('admin-password').value;
  if (pw) AuthManager.verifyAdmin(pw);
});
document.getElementById('admin-password').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('btn-verify').click();
});
// Identity overlay: no backdrop click dismiss (prevent accidental visitor entry)

// ===== ADMIN TOOLBAR =====
window.addEventListener('role-changed', function(e) {
  var toolbar = document.getElementById('admin-toolbar');
  if (e.detail.role === 'admin') toolbar.classList.add('visible');
  else toolbar.classList.remove('visible');
});
document.getElementById('btn-menu').addEventListener('click', function() {
  document.getElementById('toolbar-menu').classList.toggle('open');
});
document.getElementById('btn-upload').addEventListener('click', function() { openUploadPanel(); });
document.getElementById('menu-logout').addEventListener('click', function() { AuthManager.logout(); });
document.addEventListener('click', function(e) {
  if (!e.target.closest('.admin-toolbar')) document.getElementById('toolbar-menu').classList.remove('open');
});

// ===== UPLOAD PANEL =====
var uploadState = { isOpen: false, isUploading: false, selectedFiles: [], editingDocId: null, editingVersion: null };

function openUploadPanel() {
  uploadState.isOpen = true;
  document.getElementById('upload-panel').classList.add('active');
  document.getElementById('upload-overlay').classList.add('active');
  document.getElementById('upload-date').value = new Date().toISOString().split('T')[0];
  renderUploadTags();
}

function closeUploadPanel() {
  if (uploadState.isUploading) { if (!confirm('上传正在进行中，放弃将中断上传')) return; }
  uploadState.isOpen = false;
  document.getElementById('upload-panel').classList.remove('active');
  document.getElementById('upload-overlay').classList.remove('active');
  resetUploadForm();
}

function resetUploadForm() {
  document.getElementById('upload-name').value = '';
  document.getElementById('upload-desc').value = '';
  document.getElementById('upload-preview').classList.remove('visible');
  document.getElementById('batch-queue').classList.remove('active');
  document.getElementById('upload-status').classList.remove('active');
  document.getElementById('encrypt-toggle').classList.remove('active');
  document.getElementById('encrypt-fields').style.display = 'none';
  document.getElementById('btn-publish').disabled = false;
  document.getElementById('upload-close').classList.remove('disabled');
  uploadState.selectedFiles = [];
  document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
  document.querySelectorAll('.form-input.error').forEach(function(el) { el.classList.remove('error'); });
  document.getElementById('file-input').value = '';
  uploadState.editingDocId = null;
  uploadState.editingVersion = null;
  document.querySelector('.upload-panel-title').textContent = '上传照片';
  document.getElementById('btn-publish').textContent = '发布';
}

function renderUploadTags() {
  var container = document.getElementById('upload-tags');
  var tags = (typeof DataAccess !== 'undefined') ? DataAccess.tags : [];
  var pills = tags.map(function(t) {
    return '<button class="tag-pill" data-tag-id="' + t.tagId + '">' + t.tagName + '</button>';
  }).join('');
  container.innerHTML = pills + '<button class="tag-add-btn" id="btn-add-tag-inline">+ 新建</button>';
  container.querySelectorAll('.tag-pill').forEach(function(pill) {
    pill.addEventListener('click', function() { pill.classList.toggle('selected'); });
  });
  var addBtn = document.getElementById('btn-add-tag-inline');
  if (addBtn) addBtn.addEventListener('click', function() {
    var name = prompt('新标签名（2-6 字符）');
    if (name && name.length >= 2 && name.length <= 6 && typeof DataAccess !== 'undefined') {
      DataAccess.addTag(name).then(function() { renderUploadTags(); });
    }
  });
}

document.getElementById('upload-close').addEventListener('click', closeUploadPanel);
document.getElementById('upload-overlay').addEventListener('click', function() {
  if (uploadState.isUploading) return; // 上传进行中，忽略遮罩层点击
  closeUploadPanel();
});
document.getElementById('btn-upload-cancel').addEventListener('click', closeUploadPanel);
document.getElementById('encrypt-toggle').addEventListener('click', function() {
  this.classList.toggle('active');
  document.getElementById('encrypt-fields').style.display = this.classList.contains('active') ? 'block' : 'none';
});

// Drop zone
var dropZone = document.getElementById('drop-zone');
var fileInput = document.getElementById('file-input');
dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function(e) { handleFiles(e.target.files); });

function handleFiles(files) {
  var valid = [];
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (['image/jpeg','image/png','image/webp'].indexOf(f.type) === -1) { alert('仅支持 JPG、PNG、WebP 格式'); continue; }
    if (f.size > 20 * 1024 * 1024) { alert('文件大小不能超过 20MB'); continue; }
    valid.push(f);
  }
  if (valid.length === 0) return;
  uploadState.selectedFiles = valid;
  if (valid.length === 1) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var preview = document.getElementById('upload-preview');
      preview.src = e.target.result;
      preview.classList.add('visible');
    };
    reader.readAsDataURL(valid[0]);
    document.getElementById('batch-queue').classList.remove('active');
  } else {
    document.getElementById('upload-preview').classList.remove('visible');
    var queue = document.getElementById('batch-queue');
    queue.innerHTML = valid.map(function(f, i) {
      return '<div class="batch-item' + (i === 0 ? ' active' : '') + '" data-index="' + i + '">' +
        '<img class="batch-item-thumb" src="' + URL.createObjectURL(f) + '" alt="">' +
        '<div class="batch-item-info"><div class="batch-item-name">' + f.name + '</div><div class="batch-item-status">待配置</div></div></div>';
    }).join('');
    queue.classList.add('active');
  }
}

// ===== UPLOAD FLOW =====
function doUpload() {
  console.log('doUpload called, editingDocId:', uploadState.editingDocId, 'files:', uploadState.selectedFiles.length);
  // === EDIT MODE: update existing photo metadata ===
  if (uploadState.editingDocId) {
    var name = document.getElementById('upload-name').value.trim();
    var date = document.getElementById('upload-date').value;
    var desc = document.getElementById('upload-desc').value.trim();
    var selectedTags = [];
    document.querySelectorAll('#upload-tags .tag-pill.selected').forEach(function(el) {
      selectedTags.push(el.dataset.tagId);
    });

    var updates = {
      name: name,
      date: date,
      description: desc,
      tags: selectedTags,
      _expectedVersion: uploadState.editingVersion
    };

    document.getElementById('btn-publish').disabled = true;
    document.getElementById('upload-status').classList.add('active');
    document.getElementById('status-text').textContent = '正在保存...';
    document.getElementById('progress-fill').style.width = '50%';

    DataAccess.updatePhoto(uploadState.editingDocId, updates).then(function() {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('status-text').innerHTML = '<span class="upload-success">\u2713 保存成功！</span>';
      if (typeof plausible === 'function') plausible('photo_edit', { props: { photo_id: uploadState.editingDocId } });
      setTimeout(function() { closeUploadPanel(); }, 1200);
    }).catch(function(err) {
      if (err.message === 'VERSION_CONFLICT') {
        alert('照片已被其他人修改，请刷新页面后重新编辑。');
      } else {
        alert('保存失败：' + err.message);
      }
      document.getElementById('btn-publish').disabled = false;
      document.getElementById('upload-status').classList.remove('active');
    });
    return;
  }

  // === UPLOAD MODE: create new photo(s) ===
  // Check GitHub token
  if (!GitHubAPI.getToken()) {
    console.log('No GitHub token, prompting user...');
    var token = prompt('上传照片需要 GitHub Token（在 github.com → Settings → Developer settings → Personal access tokens 创建，勾选 repo 权限）。\n\n请输入 Token：');
    if (!token || !token.trim()) { console.log('Token prompt cancelled'); return; }
    GitHubAPI.setToken(token.trim());
  }
  console.log('GitHub token ready, starting upload...');

  var name = document.getElementById('upload-name').value.trim();
  var date = document.getElementById('upload-date').value;
  var desc = document.getElementById('upload-desc').value.trim();
  var encrypted = document.getElementById('encrypt-toggle').classList.contains('active');
  var password = encrypted ? document.getElementById('encrypt-password').value : null;
  var selectedTags = [];
  document.querySelectorAll('#upload-tags .tag-pill.selected').forEach(function(el) {
    selectedTags.push(el.dataset.tagId);
  });

  uploadState.isUploading = true;
  document.getElementById('btn-publish').disabled = true;
  document.getElementById('upload-close').classList.add('disabled');
  var statusEl = document.getElementById('upload-status');
  var statusText = document.getElementById('status-text');
  var progressFill = document.getElementById('progress-fill');
  statusEl.classList.add('active');

  var files = uploadState.selectedFiles;
  var idx = 0;

  function uploadNext() {
    if (idx >= files.length) {
      uploadState.isUploading = false;
      statusText.innerHTML = '<span class="upload-success">\u2713 发布成功！</span>';
      progressFill.style.width = '100%';
      if (typeof plausible === 'function') {
        plausible('photo_upload', { props: { encrypted: encrypted, tag_count: selectedTags.length, batch_size: files.length } });
      }
      setTimeout(function() { closeUploadPanel(); }, 1500);
      return;
    }

    var file = files[idx];
    var batchLabel = files.length > 1 ? ' (' + (idx+1) + '/' + files.length + ')' : '';

    statusText.textContent = '正在压缩图片...' + batchLabel;
    progressFill.style.width = '10%';

    return ImageCompressor.compress(file).then(function(compressed) {
      var uploadBlob = compressed;
      var encData = null;
      var thumbBlob = null;

      var p = Promise.resolve();
      if (encrypted) {
        statusText.textContent = '正在加密...' + batchLabel;
        progressFill.style.width = '30%';
        p = PhotoCrypto.encrypt(compressed, password).then(function(result) {
          encData = result;
          uploadBlob = result.data;
          return generateThumbnail(file);
        }).then(function(tb) {
          thumbBlob = tb;
        });
      }

      return p.then(function() {
        statusText.textContent = '正在上传...' + batchLabel;
        progressFill.style.width = '50%';

        var photoInfo = {
          name: files.length > 1 ? name + ' (' + (idx+1) + ')' : name,
          date: date,
          description: desc,
          tags: selectedTags,
          encrypted: encrypted
        };

        return DataAccess.addPhoto(photoInfo, uploadBlob, thumbBlob, encData);
      }).then(function() {
        progressFill.style.width = Math.round(((idx + 1) / files.length) * 90) + '%';
        idx++;
        return uploadNext();
      });
    });
  }

  uploadNext().catch(function(err) {
    console.error('Upload failed:', err);
    console.error('Error details:', err.code, err.message, err.stack);
    var errMsg = err.message || '未知错误';
    if (errMsg.indexOf('permission') !== -1 || errMsg.indexOf('Missing or insufficient') !== -1) {
      errMsg = 'Firestore 权限不足 — 请检查 Security Rules 是否正确部署';
    } else if (errMsg.indexOf('超时') !== -1) {
      errMsg = 'GitHub API 超时 — 请检查网络或使用代理';
    }
    statusText.innerHTML = '<div style="color:var(--error)">上传失败：' + errMsg + '</div>' +
      '<button class="retry-btn" onclick="document.getElementById(\'btn-publish\').click()">' +
      '<span class="retry-emoji">\uD83E\uDD7A</span> 哎呀失败了，再试一次吧～</button>';
    uploadState.isUploading = false;
    document.getElementById('btn-publish').disabled = false;
    document.getElementById('upload-close').classList.remove('disabled');
  });
}

// Publish button handler
document.getElementById('btn-publish').addEventListener('click', function() {
  console.log('Publish clicked. files:', uploadState.selectedFiles.length, 'editing:', !!uploadState.editingDocId, 'isUploading:', uploadState.isUploading);
  document.querySelectorAll('.form-error').forEach(function(el) { el.classList.remove('visible'); });
  document.querySelectorAll('.form-input.error').forEach(function(el) { el.classList.remove('error'); });
  var hasError = false;
  var name = document.getElementById('upload-name').value.trim();
  if (!name) { document.getElementById('error-name').classList.add('visible'); document.getElementById('upload-name').classList.add('error'); hasError = true; }
  var encrypted = document.getElementById('encrypt-toggle').classList.contains('active');
  if (encrypted) {
    var pw = document.getElementById('encrypt-password').value;
    var confirm = document.getElementById('encrypt-confirm').value;
    if (pw.length < 4) { alert('密码至少 4 位'); hasError = true; }
    else if (pw !== confirm) { document.getElementById('error-password').classList.add('visible'); hasError = true; }
  }
  var isEditing = !!uploadState.editingDocId;
  if (hasError) return;
  if (!isEditing && uploadState.selectedFiles.length === 0) { alert('请先选择要上传的照片'); return; }
  if (typeof doUpload === 'function') doUpload();
});
</script>

<script>
// ===== TAG MANAGER =====
var TagManager = {
  open: function() {
    document.getElementById('tag-panel').classList.add('active');
    document.getElementById('tag-overlay').classList.add('active');
    this.render();
  },
  close: function() {
    document.getElementById('tag-panel').classList.remove('active');
    document.getElementById('tag-overlay').classList.remove('active');
  },
  render: function() {
    var list = document.getElementById('tag-list');
    var tags = DataAccess.tags.slice().sort(function(a, b) {
      return DataAccess.getPhotoCount(b.tagId) - DataAccess.getPhotoCount(a.tagId);
    });
    if (tags.length === 0) {
      list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--text-dim);font-size:13px">还没有标签，在下方创建</div>';
      return;
    }
    list.innerHTML = tags.map(function(tag) {
      return '<div class="tag-list-item" data-id="' + tag.tagId + '">' +
        '<div><span class="tag-list-name">' + tag.tagName + '</span>' +
        '<span class="tag-list-count">' + DataAccess.getPhotoCount(tag.tagId) + ' 张</span></div>' +
        '<div class="tag-list-actions">' +
        '<button onclick="TagManager.editTag(\'' + tag.tagId + '\',\'' + tag.tagName + '\')" title="编辑">✎</button>' +
        '<button onclick="TagManager.deleteTag(\'' + tag.tagId + '\',\'' + tag.tagName + '\')" title="删除">🗑</button>' +
        '</div></div>';
    }).join('');
  },
  addTag: function() {
    var input = document.getElementById('new-tag-input');
    var name = input.value.trim();
    if (name.length < 2 || name.length > 6) { alert('标签名需 2-6 个字符'); return; }
    if (DataAccess.tags.some(function(t) { return t.tagName === name; })) { alert('该标签已存在'); return; }
    DataAccess.addTag(name).then(function() {
      input.value = '';
      TagManager.render();
      if (typeof plausible === 'function') plausible('tag_create', {props: {tag_name: name}});
    });
  },
  editTag: function(tagId, oldName) {
    var newName = prompt('编辑标签名', oldName);
    if (!newName || newName === oldName) return;
    if (newName.length < 2 || newName.length > 6) { alert('标签名需 2-6 个字符'); return; }
    DataAccess.updateTag(tagId, newName).then(function() { TagManager.render(); });
  },
  deleteTag: function(tagId, tagName) {
    var count = DataAccess.getPhotoCount(tagId);
    var msg = count > 0 ? '该标签下有 ' + count + ' 张照片，删除后照片将变为未分类。确定删除？' : '确定删除标签「' + tagName + '」？';
    if (!confirm(msg)) return;
    DataAccess.deleteTag(tagId).then(function() {
      TagManager.render();
      if (typeof plausible === 'function') plausible('tag_delete', {props: {tag_name: tagName, affected_photos: count}});
    });
  }
};

// ===== UNLOCK MANAGER =====
var UnlockManager = {
  pendingPhotoId: null,
  init: function() {
    // Blob URL 在页面刷新后失效，清空过期的解锁状态
    sessionStorage.removeItem('unlockedPhotos');
  },
  getUnlockedSet: function() {
    var raw = sessionStorage.getItem('unlockedPhotos');
    return raw ? JSON.parse(raw) : [];
  },
  saveUnlockedSet: function(arr) { sessionStorage.setItem('unlockedPhotos', JSON.stringify(arr)); },
  isUnlocked: function(photoId) { return this.getUnlockedSet().indexOf(photoId) !== -1; },
  markUnlocked: function(photoId) {
    var arr = this.getUnlockedSet();
    if (arr.indexOf(photoId) === -1) arr.push(photoId);
    this.saveUnlockedSet(arr);
  },
  showPrompt: function(photoId) {
    this.pendingPhotoId = photoId;
    document.getElementById('unlock-overlay').classList.add('active');
    document.getElementById('unlock-password').value = '';
    document.getElementById('unlock-error').classList.remove('visible');
    document.getElementById('unlock-password').focus();
  },
  attemptUnlock: function() {
    var password = document.getElementById('unlock-password').value;
    if (!password || !this.pendingPhotoId) return;
    var photo = DataAccess.photos.find(function(p) { return p.docId === UnlockManager.pendingPhotoId; });
    if (!photo) return;
    var self = this;
    fetch(photo.storagePath).then(function(resp) {
      if (!resp.ok) throw new Error('Fetch failed');
      return resp.blob();
    }).then(function(blob) {
      return PhotoCrypto.decrypt(blob, password, photo.salt, photo.iv).then(function(decrypted) {
        var decryptedUrl = URL.createObjectURL(decrypted);
        self.markUnlocked(self.pendingPhotoId);
        var card = document.querySelector('.photo-card[data-doc-id="' + self.pendingPhotoId + '"]');
        if (card) {
          card.classList.remove('locked');
          var img = card.querySelector('img');
          img.src = decryptedUrl;
          img.dataset.decryptedSrc = decryptedUrl;
          var lockOv = card.querySelector('.lock-overlay');
          if (lockOv) lockOv.remove();
          // 更新 Lightbox 图片列表，使大图也显示解密后的图片
          var cardIdx = parseInt(card.dataset.index, 10);
          if (!isNaN(cardIdx) && typeof allPhotoSrcs !== 'undefined') {
            allPhotoSrcs[cardIdx] = decryptedUrl;
          }
        }
        document.getElementById('unlock-overlay').classList.remove('active');
        if (typeof plausible === 'function') plausible('photo_unlock', {props: {success: true}});
      });
    }).catch(function() {
      document.getElementById('unlock-error').classList.add('visible');
      if (typeof plausible === 'function') plausible('photo_unlock', {props: {success: false}});
    });
  }
};

document.getElementById('btn-unlock').addEventListener('click', function() { UnlockManager.attemptUnlock(); });
document.getElementById('unlock-password').addEventListener('keydown', function(e) { if (e.key === 'Enter') UnlockManager.attemptUnlock(); });
document.getElementById('btn-unlock-cancel').addEventListener('click', function() { document.getElementById('unlock-overlay').classList.remove('active'); });

document.getElementById('btn-save-password').addEventListener('click', function() {
  var newPw = document.getElementById('settings-new-pw').value;
  var confirmPw = document.getElementById('settings-confirm-pw').value;
  if (newPw.length < 4) { alert('密码至少 4 位'); return; }
  if (newPw !== confirmPw) { alert('两次输入的密码不一致'); return; }
  var user = firebase.auth().currentUser;
  if (!user) { alert('请先登录'); return; }
  user.updatePassword(newPw).then(function() {
    alert('密码修改成功，请重新登录');
    AuthManager.logout();
    document.getElementById('settings-panel').classList.remove('active');
    document.getElementById('settings-overlay').classList.remove('active');
  }).catch(function() { alert('密码修改失败，请重新登录后再试'); });
});

  var token = document.getElementById('settings-github-token').value.trim();

  GitHubAPI.setToken(token);
  alert('Token 已保存（会话有效）');

});

// ===== PHOTOS DATA LISTENER =====
window.addEventListener('photos-updated', function(e) {
  if (e.detail && e.detail.length > 0) {
    // 合并静态照片与 Firestore 数据，确保历史照片始终显示
    var merged = e.detail.slice();
    photoData.forEach(function(sp) {
      var exists = merged.some(function(fp) { return fp.src === sp.src; });
      if (!exists) merged.push(sp);
    });
    window.currentPhotos = merged;
  }
  if (typeof renderAll === 'function') renderAll();
});
window.addEventListener('tags-updated', function() {
  if (typeof renderAll === 'function') renderAll();
});

// ===== INITIALIZATION =====
function initApp() {
  UnlockManager.init(); // 清除页面刷新后过期的解锁状态
  DataAccess.init().then(function() {
    AuthManager.init();
  });
}
// Firebase 可能已经在之前的脚本块中初始化完毕（同步事件已错过），
// 也可能还在加载中。两种情况都处理：
if (window.firebaseReady) {
  initApp();
} else {
  window.addEventListener('firebase-ready', initApp);
}
// Fallback: ensure identity modal is interactive even if Firebase CDN is slow
setTimeout(function() {
  if (!window.firebaseReady) {
    console.log('Firebase not available — site running in static mode');
  }
}, 3000);
</script>
