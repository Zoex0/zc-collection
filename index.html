<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZC's Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer data-domain="YOUR_GITHUB_PAGES_DOMAIN" src="https://plausible.io/js/script.js"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1714;
    --bg-card: #242019;
    --text: #F2EDE4;
    --text-dim: #B8AFA6;
    --accent: #E85D26;
    --accent-glow: #FF7A3D;
    --gold: #C9A84C;
    --teal: #3DB8A2;
    --border: rgba(242, 237, 228, 0.08);
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }

  body {
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Film grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--grain);
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* ===== PAGE LOADER ===== */
  .page-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: opacity 0.6s ease;
  }
  .page-loader.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  .page-loader .loader-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 36px;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  .page-loader .loader-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  /* ===== NAVIGATION ===== */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: 60px;
    background: rgba(26, 23, 20, 0.8);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
  }
  .nav-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 26px;
    letter-spacing: 0.12em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: default;
  }
  .nav-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 4px var(--accent-glow); }
  }
  .nav-links {
    display: flex;
    gap: 4px;
  }
  .nav-links a {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 4px;
    transition: all 0.25s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-links a:hover {
    color: var(--accent);
    background: rgba(232, 93, 38, 0.08);
  }

  /* ===== HERO ===== */
  .hero {
    margin-top: 60px;
    padding: 100px 48px 60px;
    position: relative;
    overflow: hidden;
  }
  .hero-content {
    max-width: 960px;
    margin: 0 auto;
    position: relative;
  }
  .hero-tag {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hero-tag::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--accent);
  }
  .hero h1 {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(72px, 12vw, 140px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text);
  }
  .hero h1 .outline {
    -webkit-text-stroke: 1.5px var(--text-dim);
    color: transparent;
  }
  .hero h1 .highlight {
    color: var(--accent);
  }
  .hero-sub {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .hero-sub p {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 320px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex;
    gap: 40px;
  }
  .hero-stat {
    text-align: right;
  }
  .hero-stat .num {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 42px;
    color: var(--text);
    line-height: 1;
  }
  .hero-stat .label {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .hero-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--accent), var(--border), transparent);
    margin-top: 48px;
  }

  /* ===== TAG FILTER ===== */
  .tag-filter {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 48px 20px;
  }
  .tag-filter-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tag-filter-label {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
    white-space: nowrap;
  }
  .tag-btn {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tag-btn:hover {
    color: var(--text);
    border-color: rgba(242, 237, 228, 0.15);
    background: rgba(242, 237, 228, 0.06);
  }
  .tag-btn.active {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }
  .tag-btn.active:hover {
    background: var(--accent-glow);
    border-color: var(--accent-glow);
  }
  .tag-count {
    font-size: 9px;
    color: var(--text-dim);
    margin-left: 4px;
    opacity: 0.6;
  }
  .tag-btn.active .tag-count {
    color: rgba(255, 255, 255, 0.6);
  }
  /* No results message */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    display: none;
  }
  .no-results.visible { display: block; }

  .no-results-btn {
    display: inline-block;
    margin-top: 20px;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .no-results-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(232, 93, 38, 0.08);
  }

  /* ===== TIMELINE ===== */
  .timeline {
    max-width: 1060px;
    margin: 0 auto;
    padding: 60px 48px 120px;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 180px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border) 5%, var(--border) 95%, transparent);
  }
  .time-group {
    margin-bottom: 88px;
    position: relative;
  }
  .time-group:last-child { margin-bottom: 0; }
  .time-label {
    position: absolute;
    left: 0;
    top: 0;
    width: 160px;
    text-align: right;
    padding-right: 36px;
  }
  .time-label .year {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 32px;
    color: var(--text-dim);
    line-height: 1;
    letter-spacing: 0.06em;
  }
  .time-label .month {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .time-dot {
    position: absolute;
    left: 176px;
    top: 10px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 16px rgba(232, 93, 38, 0.4);
  }
  .time-dot::after {
    content: '';
    position: absolute;
    inset: -5px;
    border: 1px solid rgba(232, 93, 38, 0.3);
    border-radius: 50%;
  }
  .photos-grid {
    margin-left: 216px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* ===== PHOTO CARDS ===== */
  .photo-card {
    background: var(--bg-card);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
    cursor: pointer;
    position: relative;
  }
  .photo-card:hover {
    transform: translateY(-8px);
    border-color: rgba(232, 93, 38, 0.25);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(232, 93, 38, 0.1);
  }
  .photo-card .photo-wrapper {
    position: relative;
    overflow: hidden;
  }
  .photo-card img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
    filter: contrast(1.05) saturate(0.9);
  }
  .photo-wrapper img.lazy {
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .photo-wrapper img.lazy.loaded {
    opacity: 1;
  }
  .photo-card:hover img {
    transform: scale(1.06);
    filter: contrast(1.1) saturate(1.1);
  }
  .film-strip {
    display: flex;
    justify-content: space-between;
    padding: 6px 12px;
    background: #0D0B09;
  }
  .film-strip .perf {
    width: 12px;
    height: 6px;
    border-radius: 1px;
    background: rgba(242, 237, 228, 0.08);
  }
  .photo-card .caption {
    padding: 14px 18px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .caption .title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .caption .date {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .caption .idx {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 28px;
    color: rgba(242, 237, 228, 0.06);
    line-height: 1;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(13, 11, 9, 0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 80vw;
    max-height: 76vh;
    border-radius: 4px;
    object-fit: contain;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    cursor: pointer;
    background: rgba(242, 237, 228, 0.04);
    border: 1px solid var(--border);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .lightbox-close:hover {
    color: var(--text);
    background: rgba(242, 237, 228, 0.08);
    border-color: rgba(242, 237, 228, 0.15);
  }
  .lightbox-download {
    position: absolute;
    bottom: 36px;
    right: 36px;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .lightbox-download:hover {
    background: var(--accent-glow);
    box-shadow: 0 4px 20px rgba(232, 93, 38, 0.3);
  }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    color: var(--text-dim);
    cursor: pointer;
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  .lightbox-nav:hover {
    color: var(--text);
    background: rgba(242, 237, 228, 0.06);
  }
  .lightbox-nav.prev { left: 28px; }
  .lightbox-nav.next { right: 28px; }
  .lightbox-counter {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  /* ===== SCROLL ANIMATIONS ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-up .photo-card {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease,
                transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
  }
  .fade-up.visible .photo-card {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-up.visible .photo-card:nth-child(1) { transition-delay: 0s; }
  .fade-up.visible .photo-card:nth-child(2) { transition-delay: 0.1s; }
  .fade-up.visible .photo-card:nth-child(3) { transition-delay: 0.2s; }
  .fade-up.visible .photo-card:nth-child(4) { transition-delay: 0.3s; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .hero h1 { font-size: 56px; }
    .hero { padding: 80px 24px 40px; }
    .hero-sub { flex-direction: column; gap: 32px; align-items: flex-start; }
    .hero-stats { align-self: flex-start; }
    .nav { padding: 0 20px; }
    .nav-title { font-size: 22px; }

    .timeline { padding: 40px 20px 80px; }
    .timeline::before { left: 20px; }

    .time-label {
      position: relative;
      left: 0;
      width: auto;
      text-align: left;
      padding-left: 48px;
      padding-right: 0;
      margin-bottom: 16px;
    }
    .time-dot { left: 16px; }
    .photos-grid {
      margin-left: 48px;
      grid-template-columns: 1fr;
    }

    .lightbox-nav.prev { left: 12px; }
    .lightbox-nav.next { right: 12px; }
    .lightbox-download { bottom: 20px; right: 20px; padding: 10px 20px; }
    .lightbox-counter { bottom: 24px; }

    .tag-filter { padding: 0 20px 16px; }
    .tag-filter-inner { gap: 8px; }
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 42px; }
    .nav-links { gap: 0; }
    .nav-links a { padding: 6px 8px; font-size: 10px; }
    .hero-tag { font-size: 10px; }
    .hero-stats { gap: 24px; }
    .hero-stat .num { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="page-loader" id="page-loader">
  <div class="loader-dot"></div>
  <div class="loader-title">ZC'S COLLECTION</div>
</div>

<!-- Navigation -->
<nav class="nav" id="nav"></nav>

<!-- Hero -->
<section class="hero" id="hero"></section>

<!-- Tag Filter -->
<div class="tag-filter" id="tag-filter"></div>

<!-- No Results -->
<div class="no-results" id="no-results">
  <div>No photos match the selected tag</div>
  <button class="no-results-btn" onclick="applyFilter('')">View All</button>
</div>

<!-- Timeline -->
<section class="timeline" id="timeline"></section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <button class="lightbox-nav prev" id="lightbox-prev">&#8592;</button>
  <button class="lightbox-nav next" id="lightbox-next">&#8594;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-counter" id="lightbox-counter"></div>
  <a class="lightbox-download" id="lightbox-download" href="" download>Download</a>
</div>

<!-- Footer -->
<footer class="footer" id="footer"></footer>

<script>
  // ===== PHOTO DATA =====
  const photoData = [
    { id: 1, src: 'photos/CQ-2026.5.5.JPG', thumb: 'photos/CQ-2026.5.5.JPG', title: '机场黄昏', date: '2026-05-05', group: '2026-05', tags: ['CQ'] },
    { id: 2, src: 'photos/SH-2026.5.6.JPG', thumb: 'photos/SH-2026.5.6.JPG', title: '摩天楼宇', date: '2026-05-06', group: '2026-05', tags: ['SH'] },
    { id: 3, src: 'photos/SH-2026.5.16.JPG', thumb: 'photos/SH-2026.5.16.JPG', title: '午后街角', date: '2026-05-16', group: '2026-05', tags: ['SH'] },
    { id: 4, src: 'photos/SH-2026.5.17.JPG', thumb: 'photos/SH-2026.5.17.JPG', title: '利園夜色', date: '2026-05-17', group: '2026-05', tags: ['SH'] },
    { id: 5, src: 'photos/SH-2026.5.31.JPG', thumb: 'photos/SH-2026.5.31.JPG', title: '邮政博物馆', date: '2026-05-31', group: '2026-05', tags: ['SH'] },
    { id: 6, src: 'photos/SH-2026.6.5.JPG', thumb: 'photos/SH-2026.6.5.JPG', title: '外滩码头', date: '2026-06-05', group: '2026-06', tags: ['SH'] }
  ];

  // Helper: group photos by their group field, return sorted groups
  function getGroups(data) {
    const map = {};
    data.forEach(p => {
      if (!map[p.group]) map[p.group] = { id: p.group, photos: [] };
      map[p.group].photos.push(p);
    });
    const groupKeys = Object.keys(map).sort().reverse();
    return groupKeys.map(key => {
      const parts = key.split('-');
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = monthNames[parseInt(parts[1], 10) - 1];
      return {
        ...map[key],
        year: parts[0],
        month: month,
        label: parts[1] + '.' + parts[0]
      };
    });
  }

  const groups = getGroups(photoData);

  // ===== TAG FILTER =====
  let activeTag = null; // null = show all

  function getAllTags(data) {
    const tagMap = {};
    data.forEach(p => {
      (p.tags || []).forEach(t => {
        tagMap[t] = (tagMap[t] || 0) + 1;
      });
    });
    // Sort by count descending
    return Object.entries(tagMap)
      .sort((a, b) => b[1] - a[1])
      .map(([name, count]) => ({ name, count }));
  }

  const allTags = getAllTags(photoData);

  function renderTagFilter() {
    const container = document.getElementById('tag-filter');
    const tagsHTML = allTags.map(t =>
      `<button class="tag-btn${activeTag === t.name ? ' active' : ''}" data-tag="${t.name}">${t.name}<span class="tag-count">${t.count}</span></button>`
    ).join('');
    container.innerHTML = `
      <div class="tag-filter-inner">
        <span class="tag-filter-label">Filter:</span>
        <button class="tag-btn${activeTag === null ? ' active' : ''}" data-tag="">All<span class="tag-count">${photoData.length}</span></button>
        ${tagsHTML}
      </div>
    `;
    // Attach click handlers
    container.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        activeTag = tag === '' ? null : tag;
        applyFilter();
      });
    });
  }

  function getFilteredData() {
    if (!activeTag) return photoData;
    return photoData.filter(p => (p.tags || []).includes(activeTag));
  }

  function applyFilter(tagOverride) {
    if (tagOverride !== undefined) {
      activeTag = tagOverride === '' ? null : tagOverride;
    }
    // Re-render tag filter (update active states)
    renderTagFilter();
    // Analytics: track tag filter clicks
    if (typeof plausible === 'function') {
      plausible('tag_filter_click', {props: {tag: activeTag || 'All', count: getFilteredData().length}});
    }

    // Get filtered data
    const filtered = getFilteredData();
    const filteredGroups = getGroups(filtered);

    // Re-render timeline
    renderTimeline(filteredGroups);

    // Update hero stats
    renderHero(filtered.length, filteredGroups.length);

    // Show/hide no-results message
    const noResults = document.getElementById('no-results');
    const timeline = document.getElementById('timeline');
    if (filtered.length === 0) {
      noResults.classList.add('visible');
      timeline.style.display = 'none';
    } else {
      noResults.classList.remove('visible');
      timeline.style.display = '';
    }

    // Re-attach lightbox click handlers and update lightbox photo list
    allPhotoSrcs.length = 0;
    filteredGroups.forEach(g => g.photos.forEach(p => allPhotoSrcs.push(p.src)));

    document.querySelectorAll('.photo-card').forEach(card => {
      card.addEventListener('click', () => {
        const idx = parseInt(card.dataset.index, 10);
        openLightbox(idx);
        if (typeof plausible === 'function') {
          plausible('photo_click', {props: {index: idx + 1}});
        }
      });
    });

    // Re-observe fade-up animations
    document.querySelectorAll('.fade-up').forEach(el => {
      el.classList.remove('visible');
      fadeObserver.observe(el);
    });

    // Re-init lazy loading for newly rendered images
    initLazyLoading();
  }

  // ===== RENDER FUNCTIONS =====
  function renderNav(groups) {
    const nav = document.getElementById('nav');
    let linksHTML = groups.map(g =>
      `<a href="#${g.id}">${g.label}</a>`
    ).join('');
    nav.innerHTML = `
      <div class="nav-title"><span class="dot"></span> ZC'S COLLECTION</div>
      <div class="nav-links">${linksHTML}</div>
    `;
    // Smooth scroll for nav links
    nav.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(a.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  function renderHero(totalPhotos, totalGroups) {
    const hero = document.getElementById('hero');
    const paddedPhotos = String(totalPhotos).padStart(2, '0');
    const paddedGroups = String(totalGroups).padStart(2, '0');
    const currentYear = new Date().getFullYear();
    hero.innerHTML = `
      <div class="hero-content">
        <div class="hero-tag">ZC's Collection / ${currentYear}</div>
        <h1>
          <span class="outline">ZC'S</span><br>
          <span class="highlight">COLLECTION</span>
        </h1>
        <div class="hero-sub">
          <p>你走过的每一步</p>
          <div class="hero-stats">
            <div class="hero-stat">
              <div class="num">${paddedPhotos}</div>
              <div class="label">Photos</div>
            </div>
            <div class="hero-stat">
              <div class="num">${paddedGroups}</div>
              <div class="label">Chapters</div>
            </div>
          </div>
        </div>
        <div class="hero-line"></div>
      </div>
    `;
  }

  function renderTimeline(groups) {
    const timeline = document.getElementById('timeline');
    let globalIdx = 0;
    const groupsHTML = groups.map(group => {
      const cardsHTML = group.photos.map(photo => {
        globalIdx++;
        const idxStr = String(globalIdx).padStart(2, '0');
        const dayParts = photo.date.split('-');
        const displayDate = dayParts[1] + '.' + dayParts[2];
        const perfs = Array(8).fill('<span class="perf"></span>').join('');
        return `
          <div class="photo-card" data-index="${globalIdx - 1}">
            <div class="photo-wrapper">
              <img class="lazy" data-src="${photo.thumb}" alt="${photo.title}" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4 3'%3E%3Crect fill='%23242019' width='4' height='3'/%3E%3C/svg%3E">
            </div>
            <div class="film-strip">${perfs}</div>
            <div class="caption">
              <div>
                <div class="title">${photo.title}</div>
                <div class="date">${displayDate}</div>
              </div>
              <div class="idx">${idxStr}</div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="time-group fade-up" id="${group.id}">
          <div class="time-label">
            <div class="year">${group.year}</div>
            <div class="month">— ${group.month}</div>
          </div>
          <div class="time-dot"></div>
          <div class="photos-grid">${cardsHTML}</div>
        </div>`;
    }).join('');

    timeline.innerHTML = groupsHTML;
  }

  function renderFooter() {
    const footer = document.getElementById('footer');
    const year = new Date().getFullYear();
    footer.innerHTML = `ZC's Collection &copy; ${year} &mdash; All rights reserved`;
  }

  // ===== INITIALIZE =====
  renderNav(groups);
  renderHero(photoData.length, groups.length);
  renderTagFilter();
  renderTimeline(groups);
  initLazyLoading();
  renderFooter();

  // Dismiss page loader
  window.addEventListener('load', () => {
    const loader = document.getElementById('page-loader');
    if (loader) {
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 600);
    }
  });

  // ===== INTERACTION =====

  // Lightbox
  let currentLightboxIndex = 0;
  const initGroups = getGroups(photoData);
  let allPhotoSrcs = [];
  initGroups.forEach(g => g.photos.forEach(p => allPhotoSrcs.push(p.src)));

  function openLightbox(index) {
    currentLightboxIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function navLightbox(dir) {
    currentLightboxIndex = (currentLightboxIndex + dir + allPhotoSrcs.length) % allPhotoSrcs.length;
    updateLightbox();
    if (typeof plausible === 'function') {
      plausible('lightbox_nav', {props: {direction: dir > 0 ? 'next' : 'prev'}});
    }
  }

  function updateLightbox() {
    document.getElementById('lightbox-img').src = allPhotoSrcs[currentLightboxIndex];
    document.getElementById('lightbox-download').href = allPhotoSrcs[currentLightboxIndex];
    const current = String(currentLightboxIndex + 1).padStart(2, '0');
    const total = String(allPhotoSrcs.length).padStart(2, '0');
    document.getElementById('lightbox-counter').textContent = current + ' / ' + total;
  }

  // Attach click handlers to photo cards
  document.querySelectorAll('.photo-card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.index, 10);
      openLightbox(idx);
      if (typeof plausible === 'function') {
        plausible('photo_click', {props: {index: idx + 1}});
      }
    });
  });

  // Lightbox button handlers
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => navLightbox(-1));
  document.getElementById('lightbox-next').addEventListener('click', () => navLightbox(1));

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });

  // Close lightbox on backdrop click
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  // Analytics: track photo downloads
  document.getElementById('lightbox-download').addEventListener('click', () => {
    if (typeof plausible === 'function') {
      plausible('photo_download', {props: {index: currentLightboxIndex + 1}});
    }
  });

  // Lazy load images using IntersectionObserver
  function initLazyLoading() {
    const lazyImages = document.querySelectorAll('img.lazy:not(.loaded)');
    if ('IntersectionObserver' in window) {
      const imgObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.addEventListener('load', () => img.classList.add('loaded'));
            imgObserver.unobserve(img);
          }
        });
      }, { rootMargin: '200px' });
      lazyImages.forEach(img => imgObserver.observe(img));
    } else {
      lazyImages.forEach(img => {
        img.src = img.dataset.src;
        img.classList.add('loaded');
      });
    }
  }

  // Scroll entrance animations
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.fade-up').forEach(el => {
    fadeObserver.observe(el);
  });
</script>
</body>
</html>
