<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1A1714;
    --bg-card: #242019;
    --text: #F2EDE4;
    --text-dim: #B8AFA6;
    --accent: #E85D26;
    --accent-glow: #FF7A3D;
    --gold: #C9A84C;
    --teal: #3DB8A2;
    --border: rgba(242, 237, 228, 0.08);
    --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    --panel-bg: #1E1B17;
    --input-bg: #2A2620;
    --input-border: rgba(242,237,228,0.12);
    --success: #4CAF50;
    --error: #E53935;
    --overlay: rgba(13,11,9,0.92);
  }

  body {
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Film grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: var(--grain);
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* ===== PAGE LOADER ===== */
  .page-loader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: opacity 0.6s ease;
  }
  .page-loader.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  .page-loader .loader-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 36px;
    letter-spacing: 0.12em;
    color: var(--text);
  }
  .page-loader .loader-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }

  /* ===== IDENTITY MODAL ===== */
  .identity-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: var(--overlay); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
  }
  .identity-overlay.active { opacity: 1; pointer-events: all; }
  .identity-modal {
    width: 380px; max-width: calc(100vw - 32px);
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 32px 28px; text-align: center;
  }
  .identity-modal .brand { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 28px; letter-spacing: 0.12em; color: var(--text); margin-bottom: 8px; }
  .identity-modal .subtitle { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }
  .identity-btn { display: block; width: 100%; padding: 14px 20px; border-radius: 100px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; margin-bottom: 12px; }
  .identity-btn.visitor { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .identity-btn.visitor:hover { color: var(--text); border-color: rgba(242,237,228,0.2); }
  .identity-btn.admin { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
  .identity-btn.admin:hover { background: var(--accent-glow); box-shadow: 0 4px 20px rgba(232,93,38,0.3); }
  .identity-form { display: none; margin-top: 8px; }
  .identity-form.active { display: block; }
  .identity-input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
  .identity-input:focus { border-color: var(--accent); }
  .identity-input.error { border-color: var(--error); }
  .identity-error { font-size: 12px; color: var(--error); margin-bottom: 8px; display: none; }
  .identity-error.visible { display: block; }
  .identity-lock-msg { font-size: 13px; color: var(--text-dim); margin-top: 12px; display: none; }
  .identity-lock-msg.visible { display: block; }
  .identity-verify-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
  .identity-verify-btn:hover { background: var(--accent-glow); }
  .identity-verify-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .identity-privacy { font-size: 10px; color: rgba(184,175,166,0.5); margin-top: 24px; line-height: 1.6; }

  /* ===== ADMIN TOOLBAR ===== */
  .admin-toolbar { position: fixed; bottom: 28px; right: 28px; z-index: 150; display: none; flex-direction: column; align-items: flex-end; gap: 12px; }
  .admin-toolbar.visible { display: flex; }
  .toolbar-btn { width: 52px; height: 52px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-dim); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .toolbar-btn:hover { color: var(--text); border-color: rgba(242,237,228,0.2); }
  .toolbar-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; width: 56px; height: 56px; font-size: 24px; }
  .toolbar-btn.primary:hover { background: var(--accent-glow); box-shadow: 0 4px 24px rgba(232,93,38,0.4); }
  .toolbar-menu { display: none; flex-direction: column; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  .toolbar-menu.open { display: flex; }
  .toolbar-menu-item { padding: 10px 16px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-radius: 8px; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
  .toolbar-menu-item:hover { color: var(--text); background: rgba(242,237,228,0.04); }
  .toolbar-menu-icon { font-size: 16px; width: 20px; text-align: center; }

  /* ===== UPLOAD PANEL ===== */
  .upload-overlay { position: fixed; inset: 0; z-index: 249; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .upload-overlay.active { opacity: 1; pointer-events: all; }
  .upload-panel { position: fixed; top: 0; right: -440px; width: 420px; height: 100vh; z-index: 250; background: var(--bg-card); border-left: 1px solid var(--border); overflow-y: auto; transition: right 0.35s cubic-bezier(0.25,0.46,0.45,0.94); padding: 24px; }
  .upload-panel.active { right: 0; }
  .upload-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .upload-panel-title { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 22px; letter-spacing: 0.08em; }
  .upload-close { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .upload-close:hover { color: var(--text); border-color: rgba(242,237,228,0.2); }
  .upload-close.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .drop-zone { border: 2px dashed var(--input-border); border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.25s; margin-bottom: 20px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(232,93,38,0.04); }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone-text { font-size: 13px; color: var(--text-dim); }
  .drop-zone-hint { font-size: 11px; color: rgba(184,175,166,0.5); margin-top: 4px; }
  .drop-zone input[type="file"] { display: none; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; }
  .form-input { width: 100%; padding: 10px 14px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input.error { border-color: var(--error); }
  .form-textarea { resize: vertical; min-height: 72px; }
  .form-error { font-size: 11px; color: var(--error); margin-top: 4px; display: none; }
  .form-error.visible { display: block; }
  .tag-selector { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-selector .tag-pill { padding: 6px 14px; border-radius: 100px; font-size: 12px; font-family: 'DM Mono', monospace; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
  .tag-selector .tag-pill.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tag-selector .tag-pill:hover:not(.selected) { border-color: rgba(242,237,228,0.2); color: var(--text); }
  .tag-add-btn { padding: 6px 14px; border-radius: 100px; font-size: 12px; border: 1px dashed var(--border); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
  .tag-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .toggle-label { font-size: 13px; color: var(--text-dim); }
  .toggle-switch { width: 44px; height: 24px; border-radius: 12px; background: var(--input-bg); border: 1px solid var(--input-border); cursor: pointer; position: relative; transition: all 0.2s; }
  .toggle-switch.active { background: var(--accent); border-color: var(--accent); }
  .toggle-switch::after { content: ''; width: 18px; height: 18px; border-radius: 50%; background: var(--text); position: absolute; top: 2px; left: 2px; transition: transform 0.2s; }
  .toggle-switch.active::after { transform: translateX(20px); }
  .upload-status { display: none; padding: 16px; border-radius: 8px; background: var(--input-bg); margin-bottom: 16px; text-align: center; }
  .upload-status.active { display: block; }
  .upload-status .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .upload-status .status-text { font-size: 13px; color: var(--text-dim); }
  .upload-progress-bar { width: 100%; height: 4px; border-radius: 2px; background: var(--input-bg); margin-top: 8px; overflow: hidden; }
  .upload-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.3s; }
  .upload-success { color: var(--success); font-size: 14px; font-weight: 600; }
  .upload-actions { display: flex; gap: 12px; margin-top: 24px; }
  .btn-publish { flex: 1; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
  .btn-publish:hover { background: var(--accent-glow); }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { padding: 12px 24px; background: transparent; color: var(--text-dim); border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { color: var(--text); border-color: rgba(242,237,228,0.2); }
  .retry-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: rgba(232,93,38,0.1); border: 1px solid var(--accent); border-radius: 100px; color: var(--accent); font-size: 13px; cursor: pointer; transition: all 0.25s; margin-top: 12px; }
  .retry-btn:hover { background: var(--accent); color: #fff; }
  .retry-btn .retry-emoji { font-size: 16px; }
  .upload-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; display: none; border: 1px solid var(--border); }
  .upload-preview.visible { display: block; }
  .batch-queue { display: none; margin-bottom: 16px; }
  .batch-queue.active { display: block; }
  .batch-item { display: flex; align-items: center; gap: 12px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: all 0.2s; }
  .batch-item:hover { border-color: rgba(242,237,228,0.15); }
  .batch-item.active { border-color: var(--accent); }
  .batch-item-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
  .batch-item-info { flex: 1; min-width: 0; }
  .batch-item-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .batch-item-status { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  /* ===== NAVIGATION ===== */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    height: 60px;
    background: rgba(26, 23, 20, 0.8);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
  }
  .nav-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 26px;
    letter-spacing: 0.12em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: default;
  }
  .nav-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent-glow); }
    50% { opacity: 0.6; box-shadow: 0 0 4px var(--accent-glow); }
  }
  .nav-links {
    display: flex;
    gap: 4px;
  }
  .nav-links a {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 4px;
    transition: all 0.25s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .nav-links a:hover {
    color: var(--accent);
    background: rgba(232, 93, 38, 0.08);
  }

  /* ===== HERO ===== */
  .hero {
    margin-top: 60px;
    padding: 100px 48px 60px;
    position: relative;
    overflow: hidden;
  }
  .hero-content {
    max-width: 960px;
    margin: 0 auto;
    position: relative;
  }
  .hero-tag {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hero-tag::before {
    content: '';
    width: 32px;
    height: 1px;
    background: var(--accent);
  }
  .hero h1 {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: clamp(72px, 12vw, 140px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text);
  }
  .hero h1 .outline {
    -webkit-text-stroke: 1.5px var(--text-dim);
    color: transparent;
  }
  .hero h1 .highlight {
    color: var(--accent);
  }
  .hero-sub {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .hero-sub p {
    font-size: 15px;
    color: var(--text-dim);
    max-width: 320px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex;
    gap: 40px;
  }
  .hero-stat {
    text-align: right;
  }
  .hero-stat .num {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 42px;
    color: var(--text);
    line-height: 1;
  }
  .hero-stat .label {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .hero-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--accent), var(--border), transparent);
    margin-top: 48px;
  }

  /* ===== TAG FILTER ===== */
  .tag-filter {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 48px 20px;
  }
  .tag-filter-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tag-filter-label {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-right: 4px;
    white-space: nowrap;
  }
  .tag-btn {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .tag-btn:hover {
    color: var(--text);
    border-color: rgba(242, 237, 228, 0.15);
    background: rgba(242, 237, 228, 0.06);
  }
  .tag-btn.active {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }
  .tag-btn.active:hover {
    background: var(--accent-glow);
    border-color: var(--accent-glow);
  }
  .tag-count {
    font-size: 9px;
    color: var(--text-dim);
    margin-left: 4px;
    opacity: 0.6;
  }
  .tag-btn.active .tag-count {
    color: rgba(255, 255, 255, 0.6);
  }
  /* No results message */
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    display: none;
  }
  .no-results.visible { display: block; }

  .no-results-btn {
    display: inline-block;
    margin-top: 20px;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 24px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .no-results-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(232, 93, 38, 0.08);
  }

  /* ===== TIMELINE ===== */
  .timeline {
    max-width: 1060px;
    margin: 0 auto;
    padding: 60px 48px 120px;
    position: relative;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 180px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--border) 5%, var(--border) 95%, transparent);
  }
  .time-group {
    margin-bottom: 88px;
    position: relative;
  }
  .time-group:last-child { margin-bottom: 0; }
  .time-label {
    position: absolute;
    left: 0;
    top: 0;
    width: 160px;
    text-align: right;
    padding-right: 36px;
  }
  .time-label .year {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 32px;
    color: var(--text-dim);
    line-height: 1;
    letter-spacing: 0.06em;
  }
  .time-label .month {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .time-dot {
    position: absolute;
    left: 176px;
    top: 10px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 16px rgba(232, 93, 38, 0.4);
  }
  .time-dot::after {
    content: '';
    position: absolute;
    inset: -5px;
    border: 1px solid rgba(232, 93, 38, 0.3);
    border-radius: 50%;
  }
  .photos-grid {
    margin-left: 216px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* ===== PHOTO CARDS ===== */
  .photo-card {
    background: var(--bg-card);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
    cursor: pointer;
    position: relative;
  }
  .photo-card:hover {
    transform: translateY(-8px);
    border-color: rgba(232, 93, 38, 0.25);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(232, 93, 38, 0.1);
  }
  .photo-card .photo-wrapper {
    position: relative;
    overflow: hidden;
  }
  .photo-card img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
    filter: contrast(1.05) saturate(0.9);
  }
  .photo-wrapper img.lazy {
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .photo-wrapper img.lazy.loaded {
    opacity: 1;
  }
  .photo-card:hover img {
    transform: scale(1.06);
    filter: contrast(1.1) saturate(1.1);
  }
  .film-strip {
    display: flex;
    justify-content: space-between;
    padding: 6px 12px;
    background: #0D0B09;
  }
  .film-strip .perf {
    width: 12px;
    height: 6px;
    border-radius: 1px;
    background: rgba(242, 237, 228, 0.08);
  }
  .photo-card .caption {
    padding: 14px 18px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .caption .title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .caption .date {
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .caption .idx {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 28px;
    color: rgba(242, 237, 228, 0.06);
    line-height: 1;
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(13, 11, 9, 0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 80vw;
    max-height: 76vh;
    border-radius: 4px;
    object-fit: contain;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
  }
  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    color: var(--text-dim);
    cursor: pointer;
    background: rgba(242, 237, 228, 0.04);
    border: 1px solid var(--border);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .lightbox-close:hover {
    color: var(--text);
    background: rgba(242, 237, 228, 0.08);
    border-color: rgba(242, 237, 228, 0.15);
  }
  .lightbox-download {
    position: absolute;
    bottom: 36px;
    right: 36px;
    padding: 12px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .lightbox-download:hover {
    background: var(--accent-glow);
    box-shadow: 0 4px 20px rgba(232, 93, 38, 0.3);
  }
  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 28px;
    color: var(--text-dim);
    cursor: pointer;
    background: rgba(242, 237, 228, 0.03);
    border: 1px solid var(--border);
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.2s;
    font-family: 'Space Grotesk', sans-serif;
  }
  .lightbox-nav:hover {
    color: var(--text);
    background: rgba(242, 237, 228, 0.06);
  }
  .lightbox-nav.prev { left: 28px; }
  .lightbox-nav.next { right: 28px; }
  .lightbox-counter {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
  }

  /* ===== TAG MANAGER ===== */
  .tag-panel { position: fixed; top: 0; right: -400px; width: 380px; max-width: calc(100vw - 32px); height: 100vh; z-index: 250; background: var(--bg-card); border-left: 1px solid var(--border); overflow-y: auto; transition: right 0.35s cubic-bezier(0.25,0.46,0.45,0.94); padding: 24px; }
  .tag-panel.active { right: 0; }
  .tag-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .tag-list-name { font-size: 14px; color: var(--text); }
  .tag-list-count { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-left: 8px; }
  .tag-list-actions { display: flex; gap: 8px; }
  .tag-list-actions button { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .tag-list-actions button:hover { color: var(--text); border-color: rgba(242,237,228,0.2); }
  .tag-new-row { display: flex; gap: 8px; margin-top: 16px; }
  .tag-new-row input { flex: 1; }
  .tag-new-row button { padding: 10px 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }

  /* ===== LOCKED PHOTO STATE ===== */
  .photo-card.locked .photo-wrapper img { filter: blur(12px) contrast(1.05) saturate(0.9); pointer-events: none; }
  .photo-card.locked .lock-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; }
  .photo-card.locked .lock-icon { font-size: 48px; color: var(--accent); text-shadow: 0 0 20px rgba(232,93,38,0.4); }
  .photo-card .encrypted-badge { position: absolute; top: 8px; left: 8px; font-size: 14px; z-index: 3; opacity: 0.7; }
  .photo-card .card-actions { position: absolute; top: 8px; right: 8px; display: none; gap: 6px; z-index: 5; }
  body.is-admin .photo-card:hover .card-actions { display: flex; }
  .card-action-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: rgba(26,23,20,0.85); backdrop-filter: blur(8px); color: var(--text-dim); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .card-action-btn:hover { color: var(--text); background: rgba(36,32,25,0.95); }
  .card-action-btn.delete:hover { color: var(--error); border-color: var(--error); }

  /* Unlock modal */
  .unlock-modal-overlay { position: fixed; inset: 0; z-index: 310; background: var(--overlay); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; }
  .unlock-modal-overlay.active { display: flex; }
  .unlock-modal { width: 340px; max-width: calc(100vw - 32px); background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; text-align: center; }
  .unlock-modal .lock-big { font-size: 40px; margin-bottom: 12px; }
  .unlock-modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
  .unlock-modal input { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px; }
  .unlock-modal input:focus { border-color: var(--accent); }
  .unlock-modal .unlock-btn { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .unlock-error { font-size: 12px; color: var(--error); margin-bottom: 8px; display: none; }
  .unlock-error.visible { display: block; }

  /* Photo description */
  .caption .desc { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.5; max-height: 60px; overflow: hidden; }
  .caption .desc p { margin: 0; }
  .caption .desc strong { color: var(--text); }
  .caption .desc a { color: var(--accent); }

  /* Timeline loading state */
  .timeline-loading { text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 13px; }
  .timeline-loading .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }

  /* ===== SCROLL ANIMATIONS ===== */
  .fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .fade-up.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-up .photo-card {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s ease,
                transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                border-color 0.4s ease,
                box-shadow 0.4s ease;
  }
  .fade-up.visible .photo-card {
    opacity: 1;
    transform: translateY(0);
  }
  .fade-up.visible .photo-card:nth-child(1) { transition-delay: 0s; }
  .fade-up.visible .photo-card:nth-child(2) { transition-delay: 0.1s; }
  .fade-up.visible .photo-card:nth-child(3) { transition-delay: 0.2s; }
  .fade-up.visible .photo-card:nth-child(4) { transition-delay: 0.3s; }

  /* ===== FOOTER ===== */
  .footer {
    text-align: center;
    padding: 48px;
    color: var(--text-dim);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .hero h1 { font-size: 56px; }
    .hero { padding: 80px 24px 40px; }
    .hero-sub { flex-direction: column; gap: 32px; align-items: flex-start; }
    .hero-stats { align-self: flex-start; }
    .nav { padding: 0 20px; }
    .nav-title { font-size: 22px; }

    .timeline { padding: 40px 20px 80px; }
    .timeline::before { left: 20px; }

    .time-label {
      position: relative;
      left: 0;
      width: auto;
      text-align: left;
      padding-left: 48px;
      padding-right: 0;
      margin-bottom: 16px;
    }
    .time-dot { left: 16px; }
    .photos-grid {
      margin-left: 48px;
      grid-template-columns: 1fr;
    }

    .lightbox-nav.prev { left: 12px; }
    .lightbox-nav.next { right: 12px; }
    .lightbox-download { bottom: 20px; right: 20px; padding: 10px 20px; }
    .lightbox-counter { bottom: 24px; }

    .tag-filter { padding: 0 20px 16px; }
    .tag-filter-inner { gap: 8px; }

    /* V2.0 mobile overrides */
    .upload-panel { width: 100%; right: -100%; border-radius: 16px 16px 0 0; top: auto; bottom: 0; height: 85vh; }
    .upload-panel.active { right: 0; }
    .tag-panel { width: 100%; max-width: 100%; right: -100%; }
    .tag-panel.active { right: 0; }
    .admin-toolbar { bottom: 16px; right: 16px; }
    .identity-modal { width: calc(100vw - 32px); padding: 32px 24px 24px; }
  }

  @media (max-width: 480px) {
    .hero h1 { font-size: 42px; }
    .nav-links { gap: 0; }
    .nav-links a { padding: 6px 8px; font-size: 10px; }
    .hero-tag { font-size: 10px; }
    .hero-stats { gap: 24px; }
    .hero-stat .num { font-size: 32px; }
  }
</style>
</head>
<body>
<!-- Identity Selection Modal -->
<div class="identity-overlay active" id="identity-overlay">
  <div class="identity-modal">
    <div class="brand">ZC'S COLLECTION</div>
    <div class="subtitle">选择你的身份</div>
    <div id="identity-buttons">
      <button class="identity-btn visitor" id="btn-visitor">VISITOR — 浏览照片</button>
      <button class="identity-btn admin" id="btn-admin">ADMIN — 管理照片</button>
    </div>
    <div class="identity-form" id="identity-form">
      <input type="password" class="identity-input" id="admin-password" placeholder="输入管理员密码" autocomplete="current-password">
      <div class="identity-error" id="identity-error">密码错误</div>
      <button class="identity-verify-btn" id="btn-verify">验证</button>
    </div>
    <div class="identity-lock-msg" id="identity-lock-msg">密码错误次数过多，请 <span id="lock-countdown">30</span> 秒后重试</div>
    <div class="identity-privacy">本站使用 GitHub Pages 托管，不收集访客个人信息</div>
  </div>
</div>

<div class="page-loader" id="page-loader">
  <div class="loader-dot"></div>
  <div class="loader-title">ZC'S COLLECTION</div>
</div>

<!-- Navigation -->
<nav class="nav" id="nav"></nav>

<!-- Hero -->
<section class="hero" id="hero"></section>

<!-- Tag Filter -->
<div class="tag-filter" id="tag-filter"></div>

<!-- No Results -->
<div class="no-results" id="no-results">
  <div>No photos match the selected tag</div>
  <button class="no-results-btn" onclick="applyFilter('')">View All</button>
</div>

<!-- Timeline -->
<section class="timeline" id="timeline"></section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">&times;</button>
  <button class="lightbox-nav prev" id="lightbox-prev">&#8592;</button>
  <button class="lightbox-nav next" id="lightbox-next">&#8594;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-counter" id="lightbox-counter"></div>
  <a class="lightbox-download" id="lightbox-download" href="" download>Download</a>
</div>

<!-- Footer -->
<footer class="footer" id="footer"></footer>

<script>
  // ===== PHOTO DATA =====
  const photoData = [
    { id: 1, src: 'photos/CQ-2026.5.5.JPG', thumb: 'photos/CQ-2026.5.5.JPG', title: '机场黄昏', date: '2026-05-05', group: '2026-05', tags: ['CQ'] },
    { id: 2, src: 'photos/SH-2026.5.6.JPG', thumb: 'photos/SH-2026.5.6.JPG', title: '摩天楼宇', date: '2026-05-06', group: '2026-05', tags: ['SH'] },
    { id: 3, src: 'photos/SH-2026.5.16.JPG', thumb: 'photos/SH-2026.5.16.JPG', title: '午后街角', date: '2026-05-16', group: '2026-05', tags: ['SH'] },
    { id: 4, src: 'photos/SH-2026.5.17.JPG', thumb: 'photos/SH-2026.5.17.JPG', title: '利園夜色', date: '2026-05-17', group: '2026-05', tags: ['SH'] },
    { id: 5, src: 'photos/SH-2026.5.31.JPG', thumb: 'photos/SH-2026.5.31.JPG', title: '邮政博物馆', date: '2026-05-31', group: '2026-05', tags: ['SH'] },
    { id: 6, src: 'photos/SH-2026.6.5.JPG', thumb: 'photos/SH-2026.6.5.JPG', title: '外滩码头', date: '2026-06-05', group: '2026-06', tags: ['SH'] }
  ];

  // Helper: group photos by their group field, return sorted groups
  function getGroups(data) {
    const map = {};
    data.forEach(p => {
      if (!map[p.group]) map[p.group] = { id: p.group, photos: [] };
      map[p.group].photos.push(p);
    });
    const groupKeys = Object.keys(map).sort().reverse();
    return groupKeys.map(key => {
      const parts = key.split('-');
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = monthNames[parseInt(parts[1], 10) - 1];
      return {
        ...map[key],
        year: parts[0],
        month: month,
        label: parts[1] + '.' + parts[0]
      };
    });
  }

  const groups = getGroups(photoData);

  // ===== TAG FILTER =====
  let activeTag = null; // null = show all

  function getAllTags(data) {
    var tagMap = {};
    data.forEach(function(p) {
      (p.tags || []).forEach(function(t) {
        tagMap[t] = (tagMap[t] || 0) + 1;
      });
    });
    return Object.entries(tagMap)
      .sort(function(a, b) { return b[1] - a[1]; })
      .map(function(entry) { return { name: entry[0], count: entry[1] }; });
  }

  const allTags = getAllTags(photoData);

  function renderTagFilter() {
    const container = document.getElementById('tag-filter');
    const tagsHTML = allTags.map(t =>
      `<button class="tag-btn${activeTag === t.name ? ' active' : ''}" data-tag="${t.name}">${t.name}<span class="tag-count">${t.count}</span></button>`
    ).join('');
    container.innerHTML = `
      <div class="tag-filter-inner">
        <span class="tag-filter-label">Filter:</span>
        <button class="tag-btn${activeTag === null ? ' active' : ''}" data-tag="">All<span class="tag-count">${photoData.length}</span></button>
        ${tagsHTML}
      </div>
    `;
    // Attach click handlers
    container.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.tag;
        activeTag = tag === '' ? null : tag;
        applyFilter();
      });
    });
  }

  function getFilteredData() {
    var data = window.currentPhotos || photoData;
    if (!activeTag) return data;
    return data.filter(function(p) { return (p.tags || []).indexOf(activeTag) !== -1; });
  }

  function applyFilter(tagOverride) {
    if (tagOverride !== undefined) {
      activeTag = tagOverride === '' ? null : tagOverride;
    }
    // Re-render tag filter (update active states)
    renderTagFilter();
    // Analytics: track tag filter clicks
    if (typeof plausible === 'function') {
      plausible('tag_filter_click', {props: {tag: activeTag || 'All', count: getFilteredData().length}});
    }

    // Get filtered data
    const filtered = getFilteredData();
    const filteredGroups = getGroups(filtered);

    // Re-render timeline
    renderTimeline(filteredGroups);

    // Update hero stats
    renderHero(filtered.length, filteredGroups.length);

    // Show/hide no-results message
    const noResults = document.getElementById('no-results');
    const timeline = document.getElementById('timeline');
    if (filtered.length === 0) {
      noResults.classList.add('visible');
      timeline.style.display = 'none';
    } else {
      noResults.classList.remove('visible');
      timeline.style.display = '';
    }

    // 更新 Lightbox 图片列表（点击事件由 timeline 委托处理，无需重复绑定）
    allPhotoSrcs.length = 0;
    filteredGroups.forEach(g => g.photos.forEach(p => allPhotoSrcs.push(p.src)));

    // Re-observe fade-up animations
    document.querySelectorAll('.fade-up').forEach(el => {
      el.classList.remove('visible');
      fadeObserver.observe(el);
    });

    // Re-init lazy loading for newly rendered images
    initLazyLoading();
  }

  // ===== RENDER FUNCTIONS =====
  function renderNav(groups) {
    const nav = document.getElementById('nav');
    let linksHTML = groups.map(g =>
      `<a href="#${g.id}">${g.label}</a>`
    ).join('');
    nav.innerHTML = `
      <div class="nav-title"><span class="dot"></span> ZC'S COLLECTION</div>
      <div class="nav-links">${linksHTML}</div>
    `;
    // Smooth scroll for nav links
    nav.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', (e) => {
        e.preventDefault();
        const target = document.querySelector(a.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  }

  function renderHero(totalPhotos, totalGroups) {
    const hero = document.getElementById('hero');
    const paddedPhotos = String(totalPhotos).padStart(2, '0');
    const paddedGroups = String(totalGroups).padStart(2, '0');
    const currentYear = new Date().getFullYear();
    hero.innerHTML = `
      <div class="hero-content">
        <div class="hero-tag">ZC's Collection / ${currentYear}</div>
        <h1>
          <span class="outline">ZC'S</span><br>
          <span class="highlight">COLLECTION</span>
        </h1>
        <div class="hero-sub">
          <p>你走过的每一步</p>
          <div class="hero-stats">
            <div class="hero-stat">
              <div class="num">${paddedPhotos}</div>
              <div class="label">Photos</div>
            </div>
            <div class="hero-stat">
              <div class="num">${paddedGroups}</div>
              <div class="label">Chapters</div>
            </div>
          </div>
        </div>
        <div class="hero-line"></div>
      </div>
    `;
  }

  // ===== RENDER ALL (data refresh) =====
  function renderAll() {
    var data = window.currentPhotos || photoData;
    var groups = getGroups(data);
    renderNav(groups);
    renderHero(data.length, groups.length);
    renderTagFilter();
    renderTimeline(groups);
    initLazyLoading();

    // 同步更新 Lightbox 图片列表
    allPhotoSrcs.length = 0;
    groups.forEach(function(g) { g.photos.forEach(function(p) { allPhotoSrcs.push(p.src); }); });

    document.querySelectorAll('.fade-up').forEach(function(el) {
      el.classList.remove('visible');
      fadeObserver.observe(el);
    });
  }
  window.renderAll = renderAll;

  function editPhotoFromCard(docId) {
    var photo = DataAccess.photos.find(function(p) { return p.docId === docId; });
    if (!photo) return;
    openUploadPanel();
    document.getElementById('upload-name').value = photo.name || '';
    document.getElementById('upload-date').value = photo.date || '';
    document.getElementById('upload-desc').value = photo.description || '';
    // Mark selected tags
    setTimeout(function() {
      document.querySelectorAll('#upload-tags .tag-pill').forEach(function(pill) {
        if ((photo.tags || []).indexOf(pill.dataset.tagId) !== -1) pill.classList.add('selected');
      });
    }, 100);
    // Store docId for update instead of create
    uploadState.editingDocId = docId;
    uploadState.editingVersion = photo.version;
    document.querySelector('.upload-panel-title').textContent = '编辑照片';
    document.getElementById('btn-publish').textContent = '保存';
  }

  function renderTimeline(groups) {
    var timeline = document.getElementById('timeline');
    var isAdmin = (typeof AuthManager !== 'undefined') && AuthManager.isAdmin();
    var isVisitor = (typeof AuthManager !== 'undefined') && AuthManager.isVisitor();
    var unlockedIds = (typeof UnlockManager !== 'undefined') ? UnlockManager.getUnlockedSet() : [];
    var globalIdx = 0;
    var groupsHTML = groups.map(function(group) {
      var cardsHTML = group.photos.map(function(photo) {
        globalIdx++;
        var idxStr = String(globalIdx).padStart(2, '0');
        var dayParts = (photo.date || '0000-00-00').split('-');
        var displayDate = dayParts[1] + '.' + dayParts[2];
        var perfs = Array(8).fill('<span class="perf"></span>').join('');
        var isEncrypted = photo.encrypted;
        var isLocked = isEncrypted && isVisitor && unlockedIds.indexOf(photo.docId) === -1;
        var lockedClass = isLocked ? ' locked' : '';
        var docId = photo.docId || '';

        // Determine image source
        var imgSrc = photo.thumb || photo.src;
        var lazySrc = isLocked ? (photo.thumbnailPath || imgSrc) : imgSrc;

        // Lock overlay HTML
        var lockOverlay = isLocked ? '<div class="lock-overlay"><div class="lock-icon">🔒</div></div>' : '';

        // Admin badge for encrypted photos
        var encBadge = (isEncrypted && isAdmin) ? '<div class="encrypted-badge">🔒</div>' : '';

        // Admin action buttons
        var adminActions = '';
        if (isAdmin && docId) {
          adminActions = '<div class="card-actions">' +
            '<button class="card-action-btn" onclick="event.stopPropagation();editPhotoFromCard(\'' + docId + '\')" title="编辑">✎</button>' +
            '<button class="card-action-btn delete" onclick="event.stopPropagation();deletePhoto(\'' + docId + '\',\'' + (photo.title || '').replace(/'/g, "\\'") + '\')" title="删除">🗑</button>' +
            '</div>';
        }

        // Description (Markdown rendered)
        var descHTML = '';
        if (photo.description) {
          try {
            if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
              descHTML = '<div class="desc">' + DOMPurify.sanitize(marked.parse(photo.description)) + '</div>';
            } else {
              descHTML = '<div class="desc">' + photo.description + '</div>';
            }
          } catch(e) { descHTML = ''; }
        }

        return '<div class="photo-card' + lockedClass + '" data-index="' + (globalIdx - 1) + '" data-doc-id="' + docId + '" data-encrypted="' + (isEncrypted ? 'true' : 'false') + '">' +
          encBadge + adminActions +
          '<div class="photo-wrapper">' + lockOverlay +
          '<img class="lazy" data-src="' + lazySrc + '" alt="' + (photo.title || '') + '" src="data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 4 3\'%3E%3Crect fill=\'%23242019\' width=\'4\' height=\'3\'/%3E%3C/svg%3E">' +
          '</div>' +
          '<div class="film-strip">' + perfs + '</div>' +
          '<div class="caption"><div>' +
          '<div class="title">' + (isLocked ? '加密照片' : (photo.title || '')) + '</div>' +
          '<div class="date">' + displayDate + '</div>' +
          descHTML +
          '</div><div class="idx">' + idxStr + '</div></div></div>';
      }).join('');

      return '<div class="time-group fade-up" id="' + group.id + '">' +
        '<div class="time-label"><div class="year">' + group.year + '</div><div class="month">— ' + group.month + '</div></div>' +
        '<div class="time-dot"></div>' +
        '<div class="photos-grid">' + cardsHTML + '</div></div>';
    }).join('');

    timeline.innerHTML = groupsHTML;
  }

  function renderFooter() {
    const footer = document.getElementById('footer');
    const year = new Date().getFullYear();
    footer.innerHTML = `ZC's Collection &copy; ${year} &mdash; All rights reserved`;
  }

  // ===== INITIALIZE =====
  renderNav(groups);
  renderHero(photoData.length, groups.length);
  renderTagFilter();
  renderTimeline(groups);
  initLazyLoading();
  renderFooter();

  // Dismiss page loader (DOMContentLoaded + 1.5s timeout fallback for slow CDNs)
  function dismissLoader() {
    const loader = document.getElementById('page-loader');
    if (!loader) return;
    loader.classList.add('fade-out');
    setTimeout(() => loader.remove(), 600);
  }
  if (document.readyState === 'complete') { dismissLoader(); }
  else { window.addEventListener('load', dismissLoader); }
  setTimeout(dismissLoader, 1500);

  // ===== INTERACTION =====

  // Lightbox
  let currentLightboxIndex = 0;
  const initGroups = getGroups(photoData);
  let allPhotoSrcs = [];
  initGroups.forEach(g => g.photos.forEach(p => allPhotoSrcs.push(p.src)));

  function openLightbox(index) {
    currentLightboxIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function navLightbox(dir) {
    currentLightboxIndex = (currentLightboxIndex + dir + allPhotoSrcs.length) % allPhotoSrcs.length;
    updateLightbox();
    if (typeof plausible === 'function') {
      plausible('lightbox_nav', {props: {direction: dir > 0 ? 'next' : 'prev'}});
    }
  }

  function updateLightbox() {
    var imgEl = document.getElementById('lightbox-img');
    var src = allPhotoSrcs[currentLightboxIndex];
    var photos = window.currentPhotos || photoData;
    var photo = photos[currentLightboxIndex];

    // 安全防线：加密照片如果尚未解密（src 不是 blob URL），弹出解锁框
    if (photo && photo.encrypted && photo.docId &&
        src && src.indexOf('blob:') !== 0 &&
        typeof UnlockManager !== 'undefined' && !UnlockManager.isUnlocked(photo.docId)) {
      closeLightbox();
      UnlockManager.showPrompt(photo.docId);
      return;
    }

    // 加密照片：如果图片加载失败（.bin 等加密文件），回退到缩略图
    imgEl.onerror = function() {
      if (photo && photo.encrypted && photo.thumbnailPath) {
        imgEl.onerror = null;
        imgEl.src = photo.thumbnailPath;
      }
    };
    imgEl.src = src;
    document.getElementById('lightbox-download').href = src;
    const current = String(currentLightboxIndex + 1).padStart(2, '0');
    const total = String(allPhotoSrcs.length).padStart(2, '0');
    document.getElementById('lightbox-counter').textContent = current + ' / ' + total;
  }

  // 使用事件委托处理照片卡片点击（避免多次 render 导致重复绑定）
  document.getElementById('timeline').addEventListener('click', function(e) {
    var card = e.target.closest('.photo-card');
    if (!card) return;
    var docId = card.dataset.docId;

    // 如果照片处于加锁状态，弹出解锁提示
    if (card.classList.contains('locked')) {
      if (typeof UnlockManager !== 'undefined' && docId) {
        UnlockManager.showPrompt(docId);
      }
      return;
    }

    // 加密照片尚未解密时，也需要输入密码才能查看大图
    if (card.dataset.encrypted === 'true' && docId) {
      var alreadyUnlocked = (typeof UnlockManager !== 'undefined') && UnlockManager.isUnlocked(docId);
      if (!alreadyUnlocked) {
        UnlockManager.showPrompt(docId);
        return;
      }
    }

    var idx = parseInt(card.dataset.index, 10);
    openLightbox(idx);
    if (typeof plausible === 'function') plausible('photo_click', {props: {index: idx + 1}});
  });

  // Lightbox button handlers
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => navLightbox(-1));
  document.getElementById('lightbox-next').addEventListener('click', () => navLightbox(1));

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navLightbox(-1);
    if (e.key === 'ArrowRight') navLightbox(1);
  });

  // Esc key dismisses identity modal → default to visitor
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var overlay = document.getElementById('identity-overlay');
      if (overlay && overlay.classList.contains('active') && typeof AuthManager !== 'undefined') {
        AuthManager.setRole('visitor');
      }
    }
  });

  // Close lightbox on backdrop click
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeLightbox();
  });

  // Analytics: track photo downloads
  document.getElementById('lightbox-download').addEventListener('click', () => {
    if (typeof plausible === 'function') {
      plausible('photo_download', {props: {index: currentLightboxIndex + 1}});
    }
  });

  // Lazy load images using IntersectionObserver
  function initLazyLoading() {
    const lazyImages = document.querySelectorAll('img.lazy:not(.loaded)');
    if ('IntersectionObserver' in window) {
      const imgObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            img.addEventListener('load', () => img.classList.add('loaded'));
            imgObserver.unobserve(img);
          }
        });
      }, { rootMargin: '200px' });
      lazyImages.forEach(img => imgObserver.observe(img));
    } else {
      lazyImages.forEach(img => {
        img.src = img.dataset.src;
        img.classList.add('loaded');
      });
    }
  }

  // Scroll entrance animations
  const fadeObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.fade-up').forEach(el => {
    fadeObserver.observe(el);
  });
</script>
